{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Crear Estudiante</h2>
        <form method="POST" action="/students/create">
            <div class="mb-3">
                <label class="form-label">DNI</label>
                <input type="text" class="form-control" name="dni" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" name="name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Edad</label>
                <input type="number" class="form-control" name="age">
            </div>
            <div class="mb-3">
                <label class="form-label">Nota</label>
                <input type="number" step="0.1" class="form-control" name="grade">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" name="is_approved" id="is_approved">
                <label class="form-check-label" for="is_approved">Aprobado</label>
            </div>
            <button type="submit" class="btn btn-success">Crear</button>
            <a href="/students/" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
