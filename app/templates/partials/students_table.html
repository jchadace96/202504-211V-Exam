<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>DNI</th>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Nota</th>
            <th>Aprobado</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr id="student-{{ student['id'] }}">
            <td>{{ student['id'] }}</td>
            <td>{{ student['dni'] }}</td>
            <td>{{ student['name'] }}</td>
            <td>{{ student['age'] }}</td>
            <td>{{ student['grade'] }}</td>
            <td>
                {% if student['is_approved'] %}
                    <span class="badge bg-success">Sí</span>
                {% else %}
                    <span class="badge bg-danger">No</span>
                {% endif %}
            </td>
            <td>
                <a href="/students/{{ student['id'] }}" class="btn btn-sm btn-info">Ver</a>
                <a href="/students/update/{{ student['id'] }}" class="btn btn-sm btn-warning">Editar</a>
                <button class="btn btn-sm btn-danger"
                    hx-delete="/students/delete/{{ student['id'] }}"
                    hx-target="#student-{{ student['id'] }}"
                    hx-swap="outerHTML"
                    hx-confirm="¿Estás seguro de eliminar este estudiante?">
                    Eliminar
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
